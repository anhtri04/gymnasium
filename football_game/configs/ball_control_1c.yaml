# Ball Control Stage 1c: Must rotate to face ball
# Teaches: directional control, rotation before movement
# Uses standard 10-dim observation for weight transfer compatibility

mode: ball_control
stage: "1c"
stage_name: "Ball Control - Rotation Control"

# Field configuration
field:
  width: 500
  height: 350
  start_x: 350
  start_y: 225

# Single ball behind agent
balls:
  - x: 500  # Behind agent (must rotate 180)
    y: 400
    vx: 0
    vy: 0

# Agent starting position facing AWAY from ball
agent:
  x: 600
  y: 400
  angle: 0  # Facing right, ball is behind

# Stationary opponent for observation consistency
opponent:
  type: "stationary"
  x: 800
  y: 400
  angle: 180

# Success criteria
success_criteria:
  min_avg_reward: 0.2
  min_episodes: 50
  max_steps: 2000

# Rewards
rewards:
  touch: 0.1
  rotate_toward: 0.01
  proximity: 0.005
  max_steps: 2000
