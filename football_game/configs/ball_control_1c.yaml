# Ball Control Stage 1c: Must rotate to face ball
# Teaches: directional control
# Field: MEDIUM (500x350)

mode: ball_control
stage: "1c"
stage_name: "Ball Control - Rotation Control"

# Field configuration
field:
  width: 500
  height: 350
  start_x: 350
  start_y: 225

# Ball BEHIND agent (must rotate 180°)
balls:
  - x: 500  # Behind agent (agent at 600, facing right, ball at 500)
    y: 400
    vx: 0
    vy: 0

# Agent starting position facing AWAY from ball
agent:
  x: 600
  y: 400
  angle: 0  # Facing right, ball is at x=500 (behind)

# Opponent
opponent:
  type: "stationary"
  x: 800
  y: 400
  angle: 180

# Success criteria
success_criteria:
  min_avg_reward: 0.2
  min_episodes: 50
  max_steps: 2000

# Rewards
rewards:
  touch: 0.2
  rotate_toward: 0.02
  proximity: 0.008
  max_steps: 2000
