# Stage 3: Full Game
# Combines all skills with active opponent
# Uses standard 10-dim observation (same as all other stages)

mode: full_game
stage: "3"
stage_name: "Full Game - Play Against Opponent"

# Standard full-size field
field:
  width: 1000
  height: 600
  start_x: 100
  start_y: 100

# Single ball at center
balls:
  - x: 500
    y: 300
    vx: 0
    vy: 0

# Agent starting position (left side)
agent:
  x: 300
  y: 400
  angle: 0

# ACTIVE OPPONENT
opponent:
  type: "stationary"  # Can upgrade to "random" later
  x: 900
  y: 400
  angle: 180

# Standard goal
goal:
  width: 100
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.3
  min_episodes: 100
  max_steps: 3600

# All rewards enabled
rewards:
  goal: 1.0
  concede: -1.0
  touch: 0.01
  kick: 0.05
  ball_progress: 0.1
  max_steps: 3600
