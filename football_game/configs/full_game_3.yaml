# Stage 3: Full Game
# Combines all skills: ball control, rotation, shooting, and defense
# Agent plays against opponent in standard match

mode: full_game
stage: "3"
stage_name: "Full Game - Play Against Opponent"

# Standard full-size field
field:
  width: 1000
  height: 600
  start_x: 100
  start_y: 100

# Single ball, starting positions vary per episode
balls:
  - x: 500  # Center field
    y: 300
    vx: 0
    vy: 0

# Agent starting position (left side)
agent:
  x: 300
  y: 400
  angle: 0  # Facing right toward opponent goal

# OPPONENT PRESENT
opponent:
  type: "stationary"  # Start with stationary, can progress to "random"
  x: 900  # Right side
  y: 400
  angle: 180  # Facing left toward agent goal

# Standard goal
goal:
  width: 100
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.3  # Score 30% of episodes
  min_episodes: 100
  max_steps: 3600  # 60 seconds at 60 FPS
  win_rate: 0.4  # Win 40% of matches (score more than opponent)

# Rewards (all previous reward types)
rewards:
  goal: 1.0
  concede: -1.0
  touch: 0.01
  kick: 0.05
  ball_progress: 0.1
  opponent_half: 0.05
  proximity_near: 0.2
  proximity_closer: 0.3
  proximity_closest: 0.4
  max_steps: 3600
