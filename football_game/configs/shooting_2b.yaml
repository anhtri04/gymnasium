# Shooting Stage 2b: Approach and kick
# Teaches: moving toward ball then kicking
# Uses standard 10-dim observation for weight transfer compatibility

mode: shooting
stage: "2b"
stage_name: "Shooting - Approach and Kick"

# Standard field
field:
  width: 1000
  height: 600
  start_x: 100
  start_y: 100

# Single ball ahead of agent
balls:
  - x: 80  # 80px ahead
    y: 0
    vx: 0
    vy: 0

# Agent starting position
agent:
  x: 600
  y: 400
  angle: 0

# Stationary opponent for observation consistency
opponent:
  type: "stationary"
  x: 900
  y: 400
  angle: 180

# Goal configuration
goal:
  width: 200
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.6
  min_episodes: 50
  max_steps: 1000

# Rewards
rewards:
  goal: 1.0
  kick: 0.05
  ball_progress: 0.08
  max_steps: 1000
