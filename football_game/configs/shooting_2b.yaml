# Shooting Stage 2b: MEDIUM goal, ball NEAR feet
# Teaches: approach then kick
# Field: MEDIUM (700x450) with MEDIUM goal (200px)

mode: shooting
stage: "2b"
stage_name: "Shooting - Approach and Kick"

# MEDIUM field
field:
  width: 700
  height: 450
  start_x: 250
  start_y: 175

# Ball NEAR feet (must move to it)
balls:
  - x: 50  # 50px ahead
    y: 0
    vx: 0
    vy: 0
    at_feet: false

# Agent position
agent:
  x: 500
  y: 400
  angle: 0

# Opponent
opponent:
  type: "stationary"
  x: 800
  y: 400
  angle: 180

# MEDIUM goal
goal:
  width: 200  # 2x standard
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.6
  min_episodes: 50
  max_steps: 600

# Rewards
rewards:
  goal: 1.0
  kick: 0.05
  ball_progress: 0.08
  max_steps: 600
