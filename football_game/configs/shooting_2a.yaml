# Shooting Stage 2a: Wide goal, ball at feet
# Teaches: kicking toward a target
# Uses standard 10-dim observation for weight transfer compatibility

mode: shooting
stage: "2a"
stage_name: "Shooting - Wide Goal, Ball at Feet"

# Standard field
field:
  width: 1000
  height: 600
  start_x: 100
  start_y: 100

# Single ball at agent's feet
balls:
  - x: 30  # At feet offset
    y: 0
    vx: 0
    vy: 0

# Agent starting position (midfield, facing goal)
agent:
  x: 600
  y: 400
  angle: 0

# Stationary opponent for observation consistency
opponent:
  type: "stationary"
  x: 900
  y: 400
  angle: 180

# Goal configuration
goal:
  width: 300
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.7
  min_episodes: 50
  max_steps: 500

# Rewards
rewards:
  goal: 1.0
  kick: 0.1
  ball_progress: 0.05
  max_steps: 500
