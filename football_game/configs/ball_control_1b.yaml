# Ball Control Stage 1b: Chase target ball with distractors
# Teaches: chasing specific target, ignoring distractions
# Builds on: Stage 1a (learned to touch nearby balls)
# NOTE: Must have same number of balls as Stage 1a for weight transfer!

mode: ball_control
stage: "1b"
stage_name: "Ball Control - Chase Medium Distance"

# Field configuration
field:
  width: 600
  height: 400
  start_x: 300
  start_y: 200

# Three balls (same as Stage 1a for observation space compatibility)
balls:
  - x: 400  # TARGET ball - medium distance from agent
    y: 250
    vx: 0
    vy: 0
    target: true  # Mark as target ball
  - x: 50   # Distractor ball 1 - far corner
    y: 50
    vx: 0
    vy: 0
    target: false
  - x: 550  # Distractor ball 2 - far corner
    y: 350
    vx: 0
    vy: 0
    target: false

# Agent starting position
agent:
  x: 500
  y: 300
  angle: 0

# No opponent
opponent: null

# Success criteria
success_criteria:
  min_avg_reward: 0.3
  min_episodes: 50
  max_steps: 1500

# Rewards
rewards:
  touch_target: 0.08  # High reward for target ball
  touch_distractor: 0.01  # Small reward for distractors
  proximity: 0.002
  max_steps: 1500
