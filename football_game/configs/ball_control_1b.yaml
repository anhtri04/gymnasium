# Ball Control Stage 1b: Single ball at medium distance
# Teaches: chasing, navigation to distant target
# Uses standard 10-dim observation for weight transfer compatibility

mode: ball_control
stage: "1b"
stage_name: "Ball Control - Chase Medium Distance"

# Field configuration
field:
  width: 600
  height: 400
  start_x: 300
  start_y: 200

# Single ball at medium distance
balls:
  - x: 450  # 150px away from agent
    y: 350
    vx: 0
    vy: 0

# Agent starting position
agent:
  x: 600
  y: 300
  angle: 0

# Stationary opponent for observation consistency
opponent:
  type: "stationary"
  x: 850
  y: 300
  angle: 180

# Success criteria
success_criteria:
  min_avg_reward: 0.3
  min_episodes: 50
  max_steps: 1500

# Rewards
rewards:
  touch: 0.08
  proximity: 0.003
  max_steps: 1500
