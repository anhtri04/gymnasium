# Ball Control Stage 1b: Single ball at medium distance
# Teaches: chasing, navigation
# Field: MEDIUM (600x400)

mode: ball_control
stage: "1b"
stage_name: "Ball Control - Chase Medium Distance"

# Field configuration - MEDIUM
field:
  width: 600
  height: 400
  start_x: 300
  start_y: 200

# Ball at medium distance (100px away)
balls:
  - x: 550  # 100px from agent at (450, 300)
    y: 350
    vx: 0
    vy: 0

# Agent starting position
agent:
  x: 450
  y: 300
  angle: 0

# Opponent far away
opponent:
  type: "stationary"
  x: 800
  y: 300
  angle: 180

# Success criteria
success_criteria:
  min_avg_reward: 0.3
  min_episodes: 50
  max_steps: 1500

# Rewards
rewards:
  touch: 0.15
  proximity: 0.005
  max_steps: 1500
