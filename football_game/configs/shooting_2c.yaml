# Shooting Stage 2c: Standard goal accuracy
# Teaches: precision with standard goal width
# Uses standard 10-dim observation for weight transfer compatibility

mode: shooting
stage: "2c"
stage_name: "Shooting - Standard Goal Accuracy"

# Standard field
field:
  width: 1000
  height: 600
  start_x: 100
  start_y: 100

# Single ball at standard distance
balls:
  - x: 150  # 150px ahead
    y: 0
    vx: 0
    vy: 0

# Agent starting position
agent:
  x: 600
  y: 400
  angle: 0

# Stationary opponent for observation consistency
opponent:
  type: "stationary"
  x: 900
  y: 400
  angle: 180

# Goal configuration - STANDARD width
goal:
  width: 100
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.5
  min_episodes: 50
  max_steps: 1500

# Rewards
rewards:
  goal: 1.0
  kick: 0.03
  ball_progress: 0.05
  ball_in_goal_area: 0.1
  max_steps: 1500
