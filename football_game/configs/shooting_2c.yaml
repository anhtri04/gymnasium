# Shooting Stage 2c: STANDARD goal, ball at NORMAL distance
# Teaches: accuracy
# Field: STANDARD (800x500) with STANDARD goal (100px)

mode: shooting
stage: "2c"
stage_name: "Shooting - Standard Goal Accuracy"

# Field approaching standard size
field:
  width: 800
  height: 500
  start_x: 200
  start_y: 150

# Ball at standard gameplay distance
balls:
  - x: 100  # 100px ahead (normal distance)
    y: 0
    vx: 0
    vy: 0
    at_feet: false

# Agent position
agent:
  x: 500
  y: 400
  angle: 0

# Opponent
opponent:
  type: "stationary"
  x: 900
  y: 400
  angle: 180

# STANDARD goal (normal size)
goal:
  width: 100  # Standard size
  y_center: 400

# Success criteria
success_criteria:
  min_score_rate: 0.5
  min_episodes: 50
  max_steps: 1000

# Rewards
rewards:
  goal: 1.0
  kick: 0.03
  ball_progress: 0.05
  max_steps: 1000
