# Ball Control Stage 1a: Single ball VERY close to agent
# Teaches: basic movement, rotation, touching
# Field: SMALL (400x300) - confined space forces ball interaction

mode: ball_control
stage: "1a"
stage_name: "Ball Control - Close Ball"

# Field configuration - SMALL for dense interaction
field:
  width: 400
  height: 300
  start_x: 400
  start_y: 250

# Ball VERY close to agent (touching distance)
balls:
  - x: 600  # Same X as agent
    y: 430  # Only 30px away from agent (400 + 30)
    vx: 0
    vy: 0

# Agent starting position
agent:
  x: 600
  y: 400
  angle: 0

# Opponent far away, not interfering
opponent:
  type: "stationary"
  x: 750
  y: 400
  angle: 180

# Success criteria
success_criteria:
  min_avg_reward: 0.5
  min_episodes: 50
  max_steps: 1000

# Rewards
rewards:
  touch: 0.1  # High reward for touching
  proximity: 0.005
  max_steps: 1000
