# Ball Control Stage 1a: Single ball close to agent
# Teaches: movement, rotation, chasing, touching
# Uses standard 10-dim observation for weight transfer compatibility

mode: ball_control
stage: "1a"
stage_name: "Ball Control - Close Ball"

# Field configuration
field:
  width: 400
  height: 300
  start_x: 400
  start_y: 250

# Single ball (for 10-dim observation consistency)
balls:
  - x: 620  # Close to agent
    y: 420
    vx: 0
    vy: 0

# Agent starting position
agent:
  x: 600
  y: 400
  angle: 0

# Stationary opponent for observation consistency
opponent:
  type: "stationary"
  x: 750  # Far away, not interfering
  y: 400
  angle: 180

# Success criteria
success_criteria:
  min_avg_reward: 0.5
  min_episodes: 50
  max_steps: 1000

# Rewards
rewards:
  touch: 0.05
  proximity: 0.002
  max_steps: 1000
